<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morpheus">
<title>Morpheus 🌀</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0a0a0a; color:white; font-family:-apple-system,'SF Pro Display',sans-serif;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:24px; }
.logo { font-size:72px; margin-bottom:8px; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
h1 { font-size:28px; font-weight:700; margin-bottom:4px; }
.subtitle { color:#555; font-size:14px; margin-bottom:12px; }
.online { display:flex; align-items:center; gap:8px; margin-bottom:36px;
  font-size:13px; color:#10b981; }
.dot { width:8px; height:8px; border-radius:50%; background:#10b981;
  animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#login { width:100%; max-width:360px; }
.btn { width:100%; background:#161616; border:1px solid #2a2a2a; border-radius:16px;
  padding:18px 20px; margin-bottom:12px; display:flex; align-items:center;
  gap:16px; cursor:pointer; transition:all 0.15s; color:white; }
.btn:active { transform:scale(0.97); background:#1f1f1f; }
.e { font-size:32px; }
.info { flex:1; }
.name { font-size:17px; font-weight:600; }
.role { font-size:12px; color:#555; margin-top:2px; }
.arr { color:#333; font-size:20px; }
#pin { width:100%; max-width:360px; display:none; text-align:center; }
.pe { font-size:48px; margin-bottom:8px; }
.pn { font-size:22px; font-weight:700; margin-bottom:6px; }
.pl { color:#555; font-size:14px; margin-bottom:32px; }
.err { color:#ef4444; font-size:14px; height:20px; margin-bottom:16px; }
.dots { display:flex; gap:16px; justify-content:center; margin-bottom:40px; }
.d { width:16px; height:16px; border-radius:50%; background:#2a2a2a; transition:background 0.15s; }
.d.f { background:white; }
.pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.k { background:#161616; border:1px solid #2a2a2a; border-radius:14px;
  padding:20px; font-size:24px; font-weight:300; color:white; cursor:pointer;
  transition:all 0.15s; display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:70px; }
.k:active { background:#2a2a2a; transform:scale(0.95); }
.k .l { font-size:10px; color:#444; margin-top:3px; letter-spacing:1px; }
.k.del { font-size:20px; }
.k.empty { background:transparent; border-color:transparent; cursor:default; }
.back { margin-top:28px; color:#555; font-size:15px; cursor:pointer; padding:8px; }
#conn { display:none; text-align:center; }
.spin { font-size:64px; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="logo">🌀</div>
<h1>Morpheus</h1>
<p class="subtitle">Your AI family assistant</p>
<div class="online"><div class="dot"></div><span>Online</span></div>

<div id="login">
  <div class="btn" onclick="sel('nathan','👑','Nathan','Admin',true)">
    <span class="e">👑</span><div class="info"><div class="name">Nathan</div><div class="role">Admin</div></div><span class="arr">›</span>
  </div>
  <div class="btn" onclick="sel('weiqi','🌸','Wei Qi 韦琪','Family',true)">
    <span class="e">🌸</span><div class="info"><div class="name">Wei Qi 韦琪</div><div class="role">Family</div></div><span class="arr">›</span>
  </div>
  <div class="btn" onclick="sel('lucky','🎓','Lucky','Kid — Age 11',false)">
    <span class="e">🎓</span><div class="info"><div class="name">Lucky</div><div class="role">Kid — Age 11</div></div><span class="arr">›</span>
  </div>
  <div class="btn" onclick="sel('seven','🧸','Seven','Kid — Age 3',false)">
    <span class="e">🧸</span><div class="info"><div class="name">Seven</div><div class="role">Kid — Age 3</div></div><span class="arr">›</span>
  </div>
</div>

<div id="pin">
  <div class="pe" id="pe"></div>
  <div class="pn" id="pn"></div>
  <div class="pl">Enter your 4-digit PIN</div>
  <div class="err" id="err"></div>
  <div class="dots"><div class="d" id="d0"></div><div class="d" id="d1"></div><div class="d" id="d2"></div><div class="d" id="d3"></div></div>
  <div class="pad">
    <button class="k" onclick="add('1')">1</button>
    <button class="k" onclick="add('2')">2<div class="l">ABC</div></button>
    <button class="k" onclick="add('3')">3<div class="l">DEF</div></button>
    <button class="k" onclick="add('4')">4<div class="l">GHI</div></button>
    <button class="k" onclick="add('5')">5<div class="l">JKL</div></button>
    <button class="k" onclick="add('6')">6<div class="l">MNO</div></button>
    <button class="k" onclick="add('7')">7<div class="l">PQRS</div></button>
    <button class="k" onclick="add('8')">8<div class="l">TUV</div></button>
    <button class="k" onclick="add('9')">9<div class="l">WXYZ</div></button>
    <button class="k empty"></button>
    <button class="k" onclick="add('0')">0</button>
    <button class="k del" onclick="del()">⌫</button>
  </div>
  <div class="back" onclick="back()">← Back</div>
</div>

<div id="conn"><div class="spin">🌀</div><p style="color:#666;margin-top:16px">Connecting...</p></div>

<script>
const GW = 'https://rutilated-nonphonetically-rochel.ngrok-free.dev';
const TOKEN = 'morpheus-family-2026-secure';
const PINS = { nathan:'0908', weiqi:'1234' };
let cur=null, pin='';

function sel(id, emoji, name, role, needPin) {
  cur = {id, emoji, name, role};
  if (!needPin) { go(); return; }
  document.getElementById('login').style.display='none';
  document.getElementById('pin').style.display='block';
  document.getElementById('pe').textContent=emoji;
  document.getElementById('pn').textContent=name;
  pin=''; dots();
}
function add(d) {
  if(pin.length>=4) return;
  pin+=d; dots();
  if(pin.length===4) check();
}
function del() { pin=pin.slice(0,-1); dots(); document.getElementById('err').textContent=''; }
function dots() { for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('f',i<pin.length); }
function check() {
  if(pin===PINS[cur.id]) { go(); }
  else { document.getElementById('err').textContent='Wrong PIN — try again'; pin=''; setTimeout(dots,100); }
}
function go() {
  document.getElementById('login').style.display='none';
  document.getElementById('pin').style.display='none';
  document.getElementById('conn').style.display='block';
  localStorage.setItem('morpheus_token', TOKEN);
  localStorage.setItem('gatewayToken', TOKEN);
  localStorage.setItem('morpheus_member', cur.id);
  setTimeout(()=>{ window.location.replace(GW+'/#token='+TOKEN); }, 600);
}
function back() {
  document.getElementById('pin').style.display='none';
  document.getElementById('login').style.display='block';
  pin=''; document.getElementById('err').textContent='';
}
</script>
</body>
</html>
